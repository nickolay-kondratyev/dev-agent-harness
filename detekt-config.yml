# Detekt configuration - builds upon default config.
# This file allows project-specific overrides without duplicating all defaults.
# See: https://detekt.dev/docs/rules/configuration/

complexity:
  LargeClass:
    # Test classes grow naturally as new subtypes are tested — exclude test sources.
    excludes: ['**/test/**']
  LongParameterList:
    # Allow more parameters in constructors for DI wiring classes and data classes.
    constructorThreshold: 9
    functionThreshold: 6
    ignoreDefaultParameters: true
    ignoreDataClasses: true

style:
  # Max line length - keep consistent with Kotlin official style guide.
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
